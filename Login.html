<!DOCTYPE html>
<html>
<head>
<title>PG Booking Login</title>
<link rel="stylesheet" href="Login.css">
</head>
<body>

<div class="container">

<div class="login-box">

<h2>PG Booking System - Login</h2>

<form>

<label for="login">Login As:</label><br>
<select required id="login">
<option value="">Select User Type</option>
<option value="customer">Customer</option>
<option value="seller">Seller (PG Owner)</option>
</select>

<br><br>

<label for="phone">Phone Number:</label><br>
<input type="tel" placeholder="Enter your phone number" required id="phone">

<br><br>

<label for="Email">Email:</label><br>
<input type="email" placeholder="Enter your email" required id="Email">

<br><br>

<label for="password">Password:</label><br>
<input type="password" placeholder="Enter your password" required id="password">

<br>

<input type="checkbox" onclick="togglePassword()"> Show Password
<br><br>

<input type="checkbox"> Remember Me

<br><br>

<button type="submit">Login</button>

</form>

<br>
<button class="google-btn">
    <img src="https://img.icons8.com/color/20/000000/google-logo.png">
    Login with Google
</button>

<br><br>

<a href="#">Forgot Password?</a><br>
<a href="#">Create New Account</a>

</div>

</div>

</body>
<script src="Login.js"></script>
</html>
